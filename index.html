<!-- index.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SITTA UT</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="login-container">
        <h2>Selamat Datang</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Masuk</button>
        </form>
        
        <div class="links">
            <!-- Referensi W3Schools Modals untuk elemen ini -->
            <a href="#" id="forgotBtn">Lupa password?</a>
            <p>Belum punya akun? <a href="#" id="registerBtn">Daftar</a></p>
        </div>
    </main>

    <!-- Modal Box (Referensi: w3schools.com/howto/howto_css_modals.asp) -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <p id="modalText">Konten Modal...</p>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
